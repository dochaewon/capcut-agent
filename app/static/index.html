<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>캡컷 에이전트</title>
<style>
  :root{
    --bg:#0a0a0a; --card:#161616; --line:#222; --line2:#2a2a2a;
    --tx:#ededed; --mut:#888; --accent:#22c55e; --chip:#1e1e1e;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--tx);
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    -webkit-font-smoothing:antialiased}
  .num{font-variant-numeric:tabular-nums;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .wrap{max-width:680px;margin:0 auto;padding:56px 24px 80px}
  header h1{font-size:18px;font-weight:600;margin:0;letter-spacing:-.01em}
  header p{color:var(--mut);margin:6px 0 0;font-size:13px}
  .chip{display:inline-block;background:var(--chip);border:1px solid var(--line2);
    border-radius:4px;padding:1px 7px;font-family:ui-monospace,Menlo,monospace;
    font-size:12px;color:#cfcfcf}
  hr{border:0;border-top:1px solid var(--line);margin:28px 0}

  /* dropzone */
  .drop{border:1px dashed var(--line2);border-radius:10px;background:var(--card);
    padding:40px 24px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s}
  .drop:hover,.drop.over{border-color:var(--accent);background:#141a15}
  .drop .big{font-size:14px;color:var(--tx)}
  .drop .sub{color:var(--mut);font-size:12px;margin-top:6px}
  .drop input{display:none}

  /* options */
  .opts{display:flex;gap:18px;flex-wrap:wrap;margin-top:16px;color:var(--mut);font-size:12px}
  .opts label{display:flex;align-items:center;gap:7px}
  .opts input{width:64px;background:var(--chip);border:1px solid var(--line2);
    color:var(--tx);border-radius:4px;padding:3px 6px;font-family:ui-monospace,Menlo,monospace}
  .opts .hint{color:#5a5a5a}

  /* stepper */
  .steps{margin-top:8px}
  .step{padding:14px 0;border-top:1px solid var(--line)}
  .step:first-child{border-top:0}
  .step .row{display:flex;align-items:center;gap:11px}
  .dot{width:6px;height:6px;border-radius:50%;background:#3a3a3a;flex:none;transition:background .2s}
  .step[data-st="running"] .dot{background:var(--accent);
    box-shadow:0 0 0 3px rgba(34,197,94,.18),0 0 10px 2px rgba(34,197,94,.55);
    animation:pulse 1s ease-in-out infinite}
  .step[data-st="done"] .dot{background:var(--accent);box-shadow:0 0 7px 1px rgba(34,197,94,.45)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
  .step .name{font-size:13px;font-weight:500}
  .step .tag{margin-left:auto;color:var(--mut);font-size:12px}
  .step[data-st="done"] .tag{color:var(--accent)}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);
    border:1px solid var(--line);border-radius:7px;overflow:hidden;margin:12px 0 2px 17px;
    max-height:0;opacity:0;transition:opacity .25s}
  .grid.show{max-height:200px;opacity:1}
  .cell{background:var(--card);padding:10px 12px}
  .cell .k{color:var(--mut);font-size:11px}
  .cell .v{font-size:15px;margin-top:3px}

  /* queue (여러 영상) */
  .queue{margin-top:16px}
  .queue:empty{margin:0}
  .qitem{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line);font-size:13px}
  .qitem:first-child{border-top:0}
  .qitem .dot{width:6px;height:6px;border-radius:50%;background:#3a3a3a;flex:none}
  .qitem[data-st="run"] .dot{background:var(--accent);box-shadow:0 0 0 3px rgba(34,197,94,.18),0 0 10px 2px rgba(34,197,94,.55);animation:pulse 1s ease-in-out infinite}
  .qitem[data-st="done"] .dot{background:var(--accent);box-shadow:0 0 7px 1px rgba(34,197,94,.45)}
  .qitem[data-st="fail"] .dot{background:#f87171;box-shadow:0 0 7px 1px rgba(248,113,113,.45)}
  .qitem .qname{color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:300px}
  .qitem .qinfo{margin-left:auto;color:var(--mut);font-size:12px}
  .qitem[data-st="fail"] .qinfo{color:#f87171}
  .qhead{color:var(--mut);font-size:12px;margin-bottom:2px}

  /* result */
  .result{display:none;background:var(--card);border:1px solid var(--line);
    border-radius:10px;padding:20px;margin-top:24px}
  .result.show{display:block}
  .result .ok{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:600}
  .result .path{margin-top:14px;color:var(--mut);font-size:12px}
  .result .path .chip{margin-top:6px;display:block;word-break:break-all;padding:8px 10px;font-size:11.5px}
  .result .how{color:var(--mut);font-size:12.5px;margin-top:14px;line-height:1.6}
  .err{display:none;color:#f87171;font-size:13px;margin-top:20px;
    background:#1a1212;border:1px solid #3a2020;border-radius:8px;padding:14px}
  .err.show{display:block}

  /* 정지 버튼 */
  .stopbar{display:none;align-items:center;gap:10px;margin-top:14px}
  .stopbar.show{display:flex}
  .stopbtn{background:#1a1212;border:1px solid #5a2a2a;color:#f87171;
    border-radius:7px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer}
  .stopbtn:hover{background:#241616;border-color:#7a3a3a}
  .stopbtn:disabled{opacity:.5;cursor:default}
  .stopbar .note{color:var(--mut);font-size:12px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>캡컷 에이전트</h1>
    <p>토킹 영상을 올리면 무음을 잘라낸 점프컷 <span class="chip">CapCut 드래프트</span>를 만듭니다.</p>
  </header>

  <hr/>

  <div class="drop" id="drop">
    <div class="big">영상을 여기로 끌어놓기 <span class="hint" style="color:#5a5a5a">또는 클릭</span></div>
    <div class="sub">mp4 · mov · <b style="color:#9a9a9a">여러 개 한꺼번에 OK</b> (순차 처리)</div>
    <div class="sub" style="margin-top:10px;color:#6a6a6a">처리 중엔 <b style="color:#9a9a9a">CapCut을 닫아두세요</b> — 드래프트 인덱스 등록 충돌 방지</div>
    <input type="file" id="file" accept="video/mp4,video/quicktime,.mp4,.mov" multiple />
  </div>

  <div class="opts">
    <label>무음 임계 <input id="noise" class="num" placeholder="auto" /> <span class="hint">dB · 비우면 자동</span></label>
    <label>최소 무음 <input id="silence" class="num" value="0.5" /> <span class="hint">s</span></label>
    <label>여유 <input id="pad" class="num" value="0.1" /> <span class="hint">s</span></label>
    <label><input type="checkbox" id="skip" checked style="width:auto" /> 이미 만든 건 건너뛰기</label>
  </div>

  <div class="stopbar" id="stopbar">
    <button class="stopbtn" id="stopbtn">⏹ 정지</button>
    <span class="note" id="stopnote">진행 중인 것까지만 끝내고 멈춥니다</span>
  </div>

  <div class="queue" id="queue"></div>

  <div class="steps" id="steps"></div>

  <div class="result" id="result">
    <div class="ok"><span class="dot" style="background:var(--accent);box-shadow:0 0 7px 1px rgba(34,197,94,.45)"></span> 드래프트 생성 완료</div>
    <div class="grid show" id="rgrid" style="margin-left:0"></div>
    <div class="path">드래프트 경로<span class="chip" id="rpath"></span></div>
    <div class="how">CapCut을 열어 <b id="rname" style="color:#cfcfcf"></b> 프로젝트를 더블클릭 → <b>직접 재생</b>해 점프컷을 확인하세요. <span class="hint" style="color:#5a5a5a">(빌드 성공 ≠ 검증)</span></div>
  </div>

  <div class="err" id="err"></div>
</div>

<script>
const $ = s => document.querySelector(s);
const drop = $('#drop'), fileEl = $('#file'), stepsEl = $('#steps'), queueEl = $('#queue');
const STAGE_LABEL = {silence:'무음 분석', asr:'음성 인식', filler:'잔말·NG', draft:'드래프트 생성'};
let busy = false, stopRequested = false, currentES = null, currentReject = null;

const stopbar = $('#stopbar'), stopbtn = $('#stopbtn');
stopbtn.onclick = () => {
  stopRequested = true;
  stopbtn.disabled = true;
  $('#stopnote').textContent = '정지 중… 진행 중인 영상까지만 마칩니다';
  if(currentES) currentES.close();
  if(currentReject) currentReject('중단됨');
};

drop.onclick = () => { if(!busy) fileEl.click(); };
['dragover','dragenter'].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.add('over')}));
['dragleave','drop'].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.remove('over')}));
drop.addEventListener('drop', ev => enqueue([...ev.dataTransfer.files]));
fileEl.onchange = () => enqueue([...fileEl.files]);

function renderStages(stages){
  stepsEl.innerHTML = stages.map(s=>`
    <div class="step" data-st="idle" id="step-${s}">
      <div class="row"><span class="dot"></span>
        <span class="name">${STAGE_LABEL[s]||s}</span>
        <span class="tag" id="tag-${s}">대기</span></div>
      <div class="grid" id="grid-${s}"></div>
    </div>`).join('');
}
function setStage(name, status, stats){
  const el = $('#step-'+name); if(!el) return;
  el.dataset.st = status;
  $('#tag-'+name).textContent = status==='running' ? '처리 중' : (status==='done' ? '완료' : '대기');
  if(stats){
    const g = $('#grid-'+name);
    g.innerHTML = Object.entries(stats).map(([k,v])=>
      `<div class="cell"><div class="k">${k}</div><div class="v num">${v}</div></div>`).join('');
    g.classList.add('show');
  }
}

// 여러 영상 큐: 골라/드롭하면 순차 처리
async function enqueue(files){
  if(busy) return;
  const vids = files.filter(f => /\.(mp4|mov)$/i.test(f.name) || /mp4|quicktime/.test(f.type));
  if(!vids.length){ showError('mp4 또는 mov 파일만 됩니다.'); return; }
  $('#err').classList.remove('show'); $('#result').classList.remove('show');

  // 파일명 충돌 방지(같은 이름 다른 영상이 서로 덮어쓰지 않게) — 고유 드래프트명 부여
  const used = new Set();
  const baseNames = vids.map(f => {
    let stem = f.name.replace(/\.[^.]+$/,''), n = stem, i = 2;
    while(used.has(n)){ n = stem+'_'+i; i++; }
    used.add(n); return n;
  });

  queueEl.innerHTML = `<div class="qhead">${vids.length}개 영상 — 순차 처리</div>` +
    vids.map((f,i)=>`<div class="qitem" data-st="wait" id="q-${i}">
      <span class="dot"></span><span class="qname">${f.name}</span>
      <span class="qinfo" id="qinfo-${i}">대기</span></div>`).join('');

  busy = true; stopRequested = false; drop.classList.add('over');
  stopbtn.disabled = false; $('#stopnote').textContent = '진행 중인 것까지만 끝내고 멈춥니다';
  stopbar.classList.add('show');
  let ok=0, fail=0, skip=0, stopped=false;
  for(let i=0;i<vids.length;i++){
    if(stopRequested){ stopped=true; }
    const it=$('#q-'+i), info=$('#qinfo-'+i);
    if(stopped){ it.dataset.st='wait'; info.textContent='중단됨'; continue; }
    it.dataset.st='run'; info.textContent='처리 중…';
    drop.querySelector('.big').innerHTML = `처리 중 (${i+1}/${vids.length}) <span class="chip">${vids[i].name}</span>`;
    stepsEl.innerHTML='';
    try{
      const r = await processOne(vids[i], baseNames[i]);
      if(r.skipped){ it.dataset.st='done'; info.textContent='건너뜀 (이미 있음)'; skip++; }
      else{
        it.dataset.st='done';
        info.innerHTML = `<span class="num">${r.total}s→${r.out_len}s · ${r.cut_pct}% 컷 · 자막 ${r.captions??0}</span>`;
        ok++;
      }
    }catch(e){
      if(stopRequested){ it.dataset.st='wait'; info.textContent='중단됨'; stopped=true; }
      else { it.dataset.st='fail'; info.textContent='실패: '+e; fail++; }
    }
  }
  busy=false; drop.classList.remove('over'); stepsEl.innerHTML=''; stopbar.classList.remove('show');
  drop.querySelector('.big').innerHTML = '영상 끌어놓기 <span class="hint" style="color:#5a5a5a">또는 클릭</span>';
  queueEl.insertAdjacentHTML('afterbegin',
    `<div class="qhead">${stopped?'정지됨':'완료'} — 성공 ${ok}${skip?` · 건너뜀 ${skip}`:''}${fail?` · 실패 ${fail}`:''}. CapCut을 열면 목록에 나타납니다.</div>`);
}

// 영상 1개: 업로드 → SSE. result로 resolve, error로 reject.
function processOne(file, baseName){
  return new Promise(async (resolve,reject)=>{
    if(stopRequested) return reject('중단됨');
    // 이미 만든 건 건너뛰기 — 업로드 전에 존재 확인(큰 파일 업로드 낭비 방지)
    if($('#skip').checked){
      try{
        const ex = await (await fetch('/exists/'+encodeURIComponent(baseName))).json();
        if(ex.exists) return resolve({skipped:true});
      }catch(_){}
    }
    let up;
    try{ up = await (await fetch('/upload',{method:'POST',body:(()=>{const fd=new FormData();fd.append('file',file);return fd;})()})).json(); }
    catch(e){ return reject('업로드 실패'); }
    if(stopRequested) return reject('중단됨');

    const q = new URLSearchParams();
    const noise=$('#noise').value.trim(); if(noise!=='') q.set('noise',noise);
    q.set('silence',$('#silence').value||'0.5'); q.set('pad',$('#pad').value||'0.1');
    if(baseName) q.set('name', baseName);

    const es = new EventSource('/run/'+up.id+'?'+q.toString());
    let done=false;
    currentES = es;                      // 정지 버튼이 닫을 수 있게 보관
    currentReject = reject;
    const finish = () => { currentES = null; currentReject = null; };
    es.addEventListener('stages', e=> renderStages(JSON.parse(e.data).stages));
    es.addEventListener('stage', e=>{ const d=JSON.parse(e.data); setStage(d.name,d.status,d.stats); });
    es.addEventListener('result', e=>{ done=true; es.close(); finish(); resolve(JSON.parse(e.data)); });
    es.addEventListener('error', e=>{
      es.close(); finish();
      if(done) return;                      // 정상 종료 후의 close는 무시
      if(stopRequested) return reject('중단됨');
      let msg='연결 끊김'; try{ msg=JSON.parse(e.data).message; }catch(_){}
      reject(msg);
    });
  });
}
function showError(m){ const e=$('#err'); e.textContent='오류 — '+m; e.classList.add('show'); }
</script>
</body>
</html>
